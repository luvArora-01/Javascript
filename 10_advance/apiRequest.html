<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        #card {
            width: 320px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            color: white;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.4);
            transition: 0.3s ease;
        }

        #card:hover {
            transform: translateY(-5px);
        }

        #card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 15px;
        }

        #card h2 {
            margin-bottom: 10px;
        }

        #card p {
            margin: 8px 0;
            color: #ddd;
        }

        #getDetails {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #00b894;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        #getDetails:hover {
            background: #019875;
            transform: scale(1.05);
        }
        a{
            color: #00b894;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <div id="card">
            <h2>GitHub Profile</h2>
            <p>Click button to load details</p>
        </div>

        <button id="getDetails">GET DETAILS</button>

    </div>

</body>

<script src="script.js"></script>

</html>
